      // --- Components ---
      function ScrollToTop() {
        const { pathname } = useLocation();
        useEffect(() => {
          window.scrollTo(0, 0);
        }, [pathname]);
        return null;
      }

      function ParallaxImage({ src, alt, className, overlay = true }) {
        const ref = useRef(null);
        const { scrollYProgress } = useScroll({
          target: ref,
          offset: ["start end", "end start"],
        });
        const y = useTransform(scrollYProgress, [0, 1], ["-20%", "20%"]);
        return (
          <div
            ref={ref}
            className={cn("relative overflow-hidden w-full h-full", className)}
          >
            <motion.img
              src={src}
              alt={alt}
              style={{ y, scale: 1.2 }}
              className="absolute inset-0 w-full h-full object-cover"
              referrerPolicy="no-referrer"
            />
            {overlay && (
              <div className="absolute inset-0 bg-black-900/60 mix-blend-multiply" />
            )}
          </div>
        );
      }

      function SectionHeading({ title, subtitle, align = "left", className }) {

              align === "center" && "text-center",

                        key={space.title}
                        className={`flex flex-col ${isEven ? "lg:flex-row" : "lg:flex-row-reverse"} gap-12 items-center`}
                      >
                        <motion.div
                          initial={{ opacity: 0, x: isEven ? -50 : 50 }}
                          whileInView={{ opacity: 1, x: 0 }}
                          viewport={{ once: true }}
                          className="w-full lg:w-1/2 relative aspect-[4/3] overflow-hidden border border-white/10"
                        >
                          <img
                            src={space.img}
                            alt={space.title}
                            className="w-full h-full object-cover hover:scale-105 transition-transform duration-700"
                            referrerPolicy="no-referrer"
                          />
                        </motion.div>
                        <motion.div
                          initial={{ opacity: 0, y: 30 }}
                          whileInView={{ opacity: 1, y: 0 }}
                          viewport={{ once: true }}
                          className="w-full lg:w-1/2"
                        >
                          <div className="flex items-center gap-4 mb-6">
                            <div className="w-12 h-12 bg-gold-500 flex items-center justify-center text-black-900">
                              <Icon size={24} />
                            </div>
                            <h3 className="text-3xl font-bold text-white uppercase tracking-wider">
                              {space.title}
                            </h3>
                          </div>
                          <p className="text-gray-400 text-lg leading-relaxed mb-8">
                            {space.desc}
                          </p>
                          <button className="px-8 py-4 border border-gold-500 text-gold-500 font-bold uppercase tracking-wider hover:bg-gold-500 hover:text-black-900 transition-colors">
                            Reservar Espaço
                          </button>
                        </motion.div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </section>
          </div>
        );
      }

      // --- App ---
      function App() {
        return (
          <Router>
            <ScrollToTop />
            <div className="min-h-screen flex flex-col bg-black-900 text-white font-sans">
              <Navbar />
              <main className="flex-grow">
                <Routes>
                  <Route path="/" element={<Home />} />
                  <Route path="/negocios" element={<Negocios />} />
                  <Route path="/educacao" element={<Educacao />} />
                  <Route path="/clubes" element={<Clubes />} />
                  <Route path="/vale-avancar" element={<ValeAvancar />} />
                  <Route path="/arena" element={<Arena />} />
                  <Route path="/qualidade-vida" element={<QualidadeVida />} />
                  <Route path="/espacos" element={<Espacos />} />
                </Routes>
              </main>
              <Footer />
            </div>
          </Router>
        );
      }

      // --- Render ---
      createRoot(document.getElementById("root")).render(
        <StrictMode>
          <App />
        </StrictMode>,
      );
    </script>
  </body>
</html>
